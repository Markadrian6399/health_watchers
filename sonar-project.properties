# SonarCloud configuration for the Health Watchers monorepo
sonar.organization=jerryvic911
sonar.host.url=https://sonarcloud.io

# Project key — must match SonarCloud project
sonar.projectKey=Health-watchers_health_watchers
sonar.projectName=Health Watchers

# Monorepo sources — all three apps
sonar.sources=apps/api/src,apps/web/src,apps/stellar-service/src

# Test paths
sonar.tests=apps/api/src,apps/web/src,apps/stellar-service/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

# Coverage reports (lcov generated by Jest)
sonar.javascript.lcov.reportPaths=\
  apps/api/coverage/lcov.info,\
  apps/web/coverage/lcov.info,\
  apps/stellar-service/coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/migrations/**

sonar.cpd.exclusions=**/migrations/**